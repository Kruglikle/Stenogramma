services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audio_transcribator}
      POSTGRES_USER: ${POSTGRES_USER:-audio_transcribator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audio_transcribator_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-audio_transcribator}:${POSTGRES_PASSWORD:-audio_transcribator_password}@db:5432/${POSTGRES_DB:-audio_transcribator}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
