{% extends "base.html" %}

{% block title %}Стенограмма | Стенограмма{% endblock %}

{% block content %}
<section class="panel">
  <div class="section-header">
    <h1>Стенограмма</h1>
  </div>
  <form class="form upload-form" method="post" action="/ui/upload" enctype="multipart/form-data">
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <label>
      Аудио или видеофайл
      <input name="file" type="file" accept="audio/*,video/*">
    </label>
    <label>
      Ссылка на видео или аудио
      <input name="source_url" type="url" placeholder="https://example.com/video">
    </label>
    <label>
      Модель распознавания
      <select name="transcription_model" required>
        {% for model in transcription_models %}
          <option value="{{ model.id }}" {% if model.id == selected_transcription_model %}selected{% endif %}>
            {{ model.label }}
          </option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Запустить обработку</button>
  </form>
</section>
{% endblock %}
